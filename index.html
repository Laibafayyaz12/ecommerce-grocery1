<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grocery Store</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <h1>🛒 My Grocery Store</h1>
    <nav>
        <a href="cart.html">Cart 🛒</a>
        <a href="login.html">Login</a>
    </nav>
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search products 🔍">
    </div>
    <div class="categories">
        <button onclick="filterCategory('All')">All</button>
        <button onclick="filterCategory('Rice')">Rice</button>
        <button onclick="filterCategory('Oil')">Oil</button>
        <button onclick="filterCategory('Sugar')">Sugar</button>
        <button onclick="filterCategory('Milk')">Milk</button>
    </div>
</header>

<main>
    <h2>Products</h2>
    <div class="products" id="products-container"></div>
</main>

<script src="script.js"></script>
</body>
</html>
